name: 🚀 Deploy AI Profile LAB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 22
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装依赖
      - name: 📦 Install dependencies
        run: npm ci

      # 4. 生成 Prisma Client
      - name: 🔧 Generate Prisma Client
        run: npx prisma generate

      # 5. 构建 Next.js 项目（注入火山引擎环境变量，确保 API routes 能内联正确值）
      - name: 🔨 Build Next.js
        env:
          VOLC_API_KEY: ${{ secrets.VOLC_API_KEY }}
          VOLC_ENDPOINT_LLM: ${{ secrets.VOLC_ENDPOINT_LLM }}
          VOLC_ENDPOINT_IMAGE: ${{ secrets.VOLC_ENDPOINT_IMAGE }}
          VOLC_BASE_URL: https://ark.cn-beijing.volces.com/api/v3
          VOLC_ACCESSKEY: ${{ secrets.VOLC_ACCESSKEY }}
          VOLC_SECRETKEY: ${{ secrets.VOLC_SECRETKEY }}
          VOLC_REGION: cn-beijing
          DATABASE_URL: "file:./dev.db"
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run build

      # 6. 通过 SCP 上传整个项目目录到服务器
      - name: 🚀 Deploy to server (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "."
          target: "/var/www/ai-profile-lab"
          rm: false

      # 7. 在服务器上执行：写入环境变量、安装依赖、初始化数据库、重启服务
      - name: 🔄 Setup & Restart on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/ai-profile-lab

            # ── 写入环境变量（从 GitHub Secrets 注入）──
            cat > .env.local << 'ENVEOF'
            # ── 火山方舟 (Volcano Ark) 配置 ──
            VOLC_API_KEY=${{ secrets.VOLC_API_KEY }}
            VOLC_ENDPOINT_LLM=${{ secrets.VOLC_ENDPOINT_LLM }}
            VOLC_ENDPOINT_IMAGE=${{ secrets.VOLC_ENDPOINT_IMAGE }}
            VOLC_BASE_URL=https://ark.cn-beijing.volces.com/api/v3

            # ── 火山引擎视觉智能服务（图片生成）──
            VOLC_ACCESSKEY=${{ secrets.VOLC_ACCESSKEY }}
            VOLC_SECRETKEY=${{ secrets.VOLC_SECRETKEY }}
            VOLC_REGION=cn-beijing

            # ── 数据库 ──
            DATABASE_URL="file:./dev.db"

            # ── 应用配置 ──
            NEXT_PUBLIC_APP_NAME="实验同学录"
            NEXT_PUBLIC_APP_SUBTITLE="2006 届校友的数字纪念册"

            # ── Admin 鉴权 ──
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ENVEOF

            chmod 600 .env.local

            # 安装依赖（服务器端）
            npm ci --omit=dev 2>/dev/null || npm install --omit=dev

            # 生成 Prisma Client
            npx prisma generate

            # 同步数据库（SQLite 首次自动创建）
            npx prisma db push --accept-data-loss 2>/dev/null || true

            # 种子数据（仅首次）
            npx prisma db seed 2>/dev/null || true

            # ── 用 ecosystem.config.js 启动 PM2（env 字段直接注入环境变量）──
            cat > ecosystem.config.js << PM2EOF
            module.exports = {
              apps: [{
                name: 'ai-profile-lab',
                script: 'npm',
                args: 'start',
                cwd: '/var/www/ai-profile-lab',
                env: {
                  NODE_ENV: 'production',
                  VOLC_API_KEY: '${{ secrets.VOLC_API_KEY }}',
                  VOLC_ENDPOINT_LLM: '${{ secrets.VOLC_ENDPOINT_LLM }}',
                  VOLC_ENDPOINT_IMAGE: '${{ secrets.VOLC_ENDPOINT_IMAGE }}',
                  VOLC_BASE_URL: 'https://ark.cn-beijing.volces.com/api/v3',
                  VOLC_ACCESSKEY: '${{ secrets.VOLC_ACCESSKEY }}',
                  VOLC_SECRETKEY: '${{ secrets.VOLC_SECRETKEY }}',
                  VOLC_REGION: 'cn-beijing',
                  DATABASE_URL: 'file:./dev.db',
                  NEXT_PUBLIC_APP_NAME: '实验同学录',
                  NEXT_PUBLIC_APP_SUBTITLE: '2006 届校友的数字纪念册',
                  ADMIN_PASSWORD: '${{ secrets.ADMIN_PASSWORD }}',
                },
                error_file: '/root/.pm2/logs/ai-profile-lab-error.log',
                out_file: '/root/.pm2/logs/ai-profile-lab-out.log',
                log_date_format: 'YYYY-MM-DD HH:mm:ss Z',
              }],
            };
            PM2EOF

            pm2 delete ai-profile-lab 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save

            # 重载 Nginx
            nginx -t && systemctl reload nginx
